<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple BBS</title>
  <style>
    li { padding: 4px; cursor: pointer; }
    li:hover { background: #eef; }
  </style>
</head>
<body>
<h1>スレッド一覧</h1>

<input id="title" placeholder="新スレッドタイトル">
<button onclick="createThread()">スレ立て</button>

<ul id="threads"></ul>

<script>
async function loadThreads() {
  const res = await fetch("/api/threads");
  const threads = await res.json();
  const ul = document.getElementById("threads");
  ul.innerHTML = "";
  threads.forEach(t => {
    const createdTime = Number(t.created) || Date.now();
    const li = document.createElement("li");
    li.textContent = `${t.title} （作成: ${new Date(createdTime).toLocaleString()} / レス:${t.posts.length}）`;
    li.onclick = () => location.href = `thread.html?id=${t.id}`;
    ul.appendChild(li);
  });
}

async function createThread() {
  const title = document.getElementById("title").value;
  const res = await fetch("/api/thread", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({title}) // 名前は送らない
  });
  const data = await res.json();
  if (data.error) alert(data.error);
  loadThreads();
}

loadThreads();
setInterval(loadThreads,5000);
</script>
</body>
</html>
